<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UK Government Services Graph</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0f1117;--surface:#161b22;--border:#21262d;--text:#c9d1d9;--muted:#8b949e;--accent:#58a6ff}
    body{background:var(--bg);color:var(--text);font-family:'Menlo','Monaco','Courier New',monospace;display:flex;height:100vh;overflow:hidden}

    /* ── Sidebar ─────────────────────────────────────────────────── */
    #sidebar{width:264px;min-width:264px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
    .sb-head{padding:12px 14px 10px;border-bottom:1px solid var(--border)}
    .sb-head h1{font-size:.85rem;color:var(--accent);margin-bottom:3px}
    .sb-head p{font-size:.7rem;color:var(--muted);line-height:1.5;margin-top:4px}
    .sb-head a{color:var(--accent);text-decoration:none}
    .sb-head a:hover{text-decoration:underline}
    .sb-sec{padding:10px 14px;border-bottom:1px solid var(--border)}
    .sb-title{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
    #search{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:.78rem;padding:5px 8px;border-radius:4px;outline:none}
    #search:focus{border-color:var(--accent)}
    #search::placeholder{color:var(--muted)}

    .ev-btn{display:flex;align-items:flex-start;gap:7px;width:100%;background:none;border:1px solid transparent;border-radius:4px;color:var(--text);font-family:inherit;font-size:.75rem;padding:4px 6px;cursor:pointer;text-align:left;line-height:1.3;margin-bottom:2px}
    .ev-btn:hover{background:var(--bg);border-color:var(--border)}
    .ev-btn.active{background:#1a3050;border-color:var(--accent)}
    .ev-icon{font-size:.9rem;min-width:16px;padding-top:1px}
    .ev-name{font-weight:bold;font-size:.74rem}
    .ev-desc{color:var(--muted);font-size:.68rem;margin-top:1px}

    .dept-row{display:flex;align-items:center;gap:7px;padding:3px 6px;border-radius:4px;cursor:pointer;border:1px solid transparent;margin-bottom:2px;font-size:.76rem}
    .dept-row:hover{background:var(--bg);border-color:var(--border)}
    .dept-row.active{background:var(--bg);border-color:var(--border)}
    .dept-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .dept-count{color:var(--muted);font-size:.68rem;margin-left:auto}

    .tog{display:flex;align-items:center;gap:7px;margin-bottom:6px;font-size:.78rem;cursor:pointer}
    .tog input{cursor:pointer;accent-color:var(--accent)}
    .req-lbl{color:#60a5fa}
    .enb-lbl{color:#6b7280}

    .lay-btn{padding:4px 10px;font-size:.76rem;font-family:inherit;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:4px;cursor:pointer;margin-right:4px;margin-bottom:4px}
    .lay-btn:hover{border-color:var(--accent);color:var(--accent)}
    .lay-btn.active{border-color:var(--accent);color:var(--accent);background:#1a3050}

    .reset-btn{width:100%;padding:6px;font-size:.78rem;font-family:inherit;background:var(--bg);border:1px solid var(--border);color:var(--muted);border-radius:4px;cursor:pointer}
    .reset-btn:hover{border-color:#ef4444;color:#ef4444}

    /* ── Graph canvas ─────────────────────────────────────────────── */
    #graph-area{flex:1;position:relative;overflow:hidden}
    #cy{width:100%;height:100%;background:var(--bg)}

    #match-info{position:absolute;top:10px;left:10px;background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:4px 10px;font-size:.72rem;color:var(--muted);pointer-events:none;display:none}
    #match-info.vis{display:block}

    /* ── Detail panel ─────────────────────────────────────────────── */
    #detail{position:absolute;right:0;top:0;bottom:0;width:320px;background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;padding:16px;transform:translateX(100%);transition:transform .2s ease}
    #detail.open{transform:translateX(0)}
    .det-close{float:right;background:none;border:none;color:var(--muted);font-size:1rem;cursor:pointer;padding:2px 5px}
    .det-close:hover{color:var(--text)}
    .det-name{font-size:.95rem;font-weight:bold;margin-bottom:8px;margin-right:24px;line-height:1.4}
    .bdg{display:inline-block;padding:2px 7px;border-radius:3px;font-size:.68rem;margin-right:4px;margin-bottom:5px}
    .bdg-dept{background:#1f3a5f;color:var(--accent)}
    .bdg-type{background:#1a3520;color:#22c55e}
    .bdg-dl{background:#4a1f1f;color:#ef4444}
    .bdg-pro{background:#3a2f12;color:#eab308}
    .bdg-gat{background:#2a2040;color:#a855f7}
    .bdg-uni{background:#1a3520;color:#22c55e}
    .bdg-mns{background:#4a1f1f;color:#ef4444}
    .det-desc{font-size:.78rem;color:var(--text);line-height:1.6;margin:10px 0;border-left:2px solid var(--border);padding-left:8px}
    .det-elig{font-size:.73rem;color:var(--muted);line-height:1.5;margin:8px 0;font-style:italic}
    .det-stitle{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:12px 0 4px}
    .det-list{list-style:none}
    .det-list li{font-size:.73rem;color:var(--text);padding:3px 0;border-bottom:1px solid var(--border)}
    .det-list li:last-child{border-bottom:none}
    .det-nid{color:var(--muted);font-size:.63rem}
    .det-link{display:block;color:var(--accent);font-size:.72rem;text-decoration:none;margin-top:10px;word-break:break-all}
    .det-link:hover{text-decoration:underline}
    .det-id{font-size:.63rem;color:var(--muted);margin-top:6px}
    .stats-line{font-size:.7rem;color:var(--muted);line-height:1.9}
    .stats-line span{color:var(--text)}
    .elig-tags{display:flex;flex-wrap:wrap;gap:4px;margin:6px 0}
    .etag{font-size:.67rem;padding:2px 7px;border-radius:10px;line-height:1.5}
    .etag-in{background:#0f2d1a;color:#3fb950;border:1px solid #238636}
    .etag-out{background:#2d0f0f;color:#f85149;border:1px solid #6e2222}
    .aq-list{list-style:none;margin:4px 0 8px}
    .aq-list li{font-size:.72rem;line-height:1.5;padding:2px 0 2px 14px;position:relative;color:#3fb950}
    .aq-list li::before{content:'✓';position:absolute;left:0;color:#238636}
    .ex-list{list-style:none;margin:4px 0 8px}
    .ex-list li{font-size:.72rem;line-height:1.5;padding:2px 0 2px 14px;position:relative;color:#f85149}
    .ex-list li::before{content:'✗';position:absolute;left:0;color:#6e2222}
    .le-tags{display:flex;flex-wrap:wrap;gap:4px;margin:6px 0}
    .le-tag{font-size:.69rem;padding:2px 8px;border-radius:10px;background:#1a3050;color:var(--accent);border:1px solid #1f4080;line-height:1.5}
  </style>
</head>
<body>
  <div id="sidebar">
    <div class="sb-head">
      <h1>UK Services Graph</h1>
      <p>A proof-of-concept service graph for UK government life events. Click a life event to trace its journey. Click any node for details.</p>
    </div>
    <div class="sb-sec">
      <div class="sb-title">Search</div>
      <input id="search" type="text" placeholder="Filter services…" autocomplete="off">
    </div>
    <div class="sb-sec">
      <div class="sb-title">Life Events &mdash; click to trace journey</div>
      <div id="ev-list"></div>
    </div>
    <div class="sb-sec">
      <div class="sb-title">Departments</div>
      <div id="dept-list"></div>
    </div>
    <div class="sb-sec">
      <div class="sb-title">Edge Types</div>
      <label class="tog"><input type="checkbox" id="tog-req" checked><span class="req-lbl">&#8212; REQUIRES</span> <span style="font-size:.65rem;color:var(--muted)">(strict order)</span></label>
      <label class="tog"><input type="checkbox" id="tog-enb" checked><span class="enb-lbl">&#8943; ENABLES</span> <span style="font-size:.65rem;color:var(--muted)">(unlocks)</span></label>
    </div>
    <div class="sb-sec">
      <div class="sb-title">Layout</div>
      <button class="lay-btn active" data-layout="cose">Force</button>
      <button class="lay-btn" data-layout="dagre">Hierarchy</button>
      <button class="lay-btn" data-layout="breadthfirst">BFS</button>
    </div>
    <div class="sb-sec">
      <button class="reset-btn" id="reset-btn">Reset All</button>
    </div>
    <div class="sb-sec" style="flex:1;border-bottom:none">
      <div class="stats-line">
        <div><span>132</span> services</div>
        <div><span>119</span> relationships</div>
        <div><span>16</span> life events</div>
      </div>
    </div>
  </div>

  <div id="graph-area">
    <div id="match-info"></div>
    <div id="cy"></div>
    <div id="detail">
      <button class="det-close" id="det-close">&#x2715;</button>
      <div id="det-body"></div>
    </div>
  </div>

  <script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
  <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
  <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
  <script>

      ch:'#eab308', la:'#84cc16', lr:'#64748b', dvsa:'#fb923c',
      ea:'#10b981', slc:'#38bdf8', tpr:'#a78bfa', other:'#9ca3af'
    };

    var NODES_DATA   = [{"data":{"id":"gro-register-birth","label":"Register the birth","fullName":"Register the birth","dept":"GRO","deptKey":"gro","serviceType":"registration","deadline":"42 days","desc":"Register at local register office. Gateway to Child Benefit, free childcare and parental leave top-ups.","govuk_url":"https://www.gov.uk/register-birth","proactive":true,"gated":false,"universal":true,"means_tested":false,"eligibilitySummary":"Required for every birth in England and Wales. Must be done by a parent or other qualified informant within 42 days.","ruleIn":[],"ruleOut":[],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"baby","icon":"◦","name":"Having a Baby"}]}},{"data":{"id":"gro-register-death","label":"Register the death","fullName":"Register the death","dept":"GRO","deptKey":"gro","serviceType":"registration","deadline":"5 days","desc":"Register at local register office. Required before probate, Tell Us Once and bereavement payments.","govuk_url":"https://www.gov.uk/register-a-death","proactive":true,"gated":false,"universal":true,"means_tested":false,"eligibilitySummary":"Required for every death in England and Wales. Must be done by a qualified informant (relative, person present at death, etc.) within 5 days.","ruleIn":[],"ruleOut":[],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"bereavement","icon":"—","name":"Death of Someone Close"}]}},{"data":{"id":"gro-death-certificate","label":"Obtain death certifi…","fullName":"Obtain death certificates","dept":"GRO","deptKey":"gro","serviceType":"document","deadline":null,"desc":"Order multiple certified copies — banks, insurers and probate all require originals.","govuk_url":"https://www.gov.uk/order-copy-birth-death-marriage-certificate","proactive":true,"gated":true,"universal":true,"means_tested":false,"eligibilitySummary":"Anyone can order certified copies of a registered death. Death must have been registered first. Banks, probate and insurers all need originals.","ruleIn":[],"ruleOut":[],"autoQualifiers":["Death registration completed"],"exclusions":[],"lifeEvents":[{"id":"bereavement","icon":"—","name":"Death of Someone Close"}]}},{"data":{"id":"gro-give-notice","label":"Give notice of marri…","fullName":"Give notice of marriage","dept":"GRO","deptKey":"gro","serviceType":"obligation","deadline":"28 days before","desc":"At local register office. Legally required at least 28 days before ceremony.","govuk_url":"https://www.gov.uk/marriages-civil-partnerships/giving-notice","proactive":true,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"Both parties to a marriage or civil partnership must give notice at their local register office at least 28 days before the ceremony. Legally required.","ruleIn":["Both parties aged 18 or over","Resident in district 7+ days"],"ruleOut":["Either party currently married or in civil partnership"],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"marriage","icon":"∞","name":"Getting Married"}]}},{"data":{"id":"gro-marriage-cert","label":"Marriage / CP certif…","fullName":"Marriage / CP certificate","dept":"GRO","deptKey":"gro","serviceType":"document","deadline":null,"desc":"Gateway document for name changes, Marriage Allowance and benefit updates.","govuk_url":"https://www.gov.uk/order-copy-birth-death-marriage-certificate","proactive":true,"gated":true,"universal":true,"means_tested":false,"eligibilitySummary":"Issued after a marriage or civil partnership ceremony. Acts as the gateway document for name changes, Marriage Allowance, and updating government records.","ruleIn":[],"ruleOut":[],"autoQualifiers":["Marriage or civil partnership ceremony completed"],"exclusions":[],"lifeEvents":[{"id":"marriage","icon":"∞","name":"Getting Married"}]}},{"data":{"id":"hmrc-child-benefit","label":"Child Benefit","fullName":"Child Benefit","dept":"HMRC","deptKey":"hmrc","serviceType":"benefit","deadline":null,"desc":"Backdatable 3 months. High Income Charge applies if either parent earns over £60k.","govuk_url":"https://www.gov.uk/child-benefit","proactive":true,"gated":false,"universal":true,"means_tested":false,"eligibilitySummary":"Available to anyone responsible for a child under 16 (or under 20 in qualifying education). Backdatable 3 months. High Income Child Benefit Charge applies if either parent earns over £60k.","ruleIn":["Responsible for child under 16"],"ruleOut":["Both parents earn over £80k"],"autoQualifiers":["Birth registered, no parent earns over £60k"],"exclusions":["Not worth claiming if household income over £80,000 — full charge claws back entire benefit. However, still worth claiming to protect NI credits."],"lifeEvents":[{"id":"baby","icon":"◦","name":"Having a Baby"}]}},{"data":{"id":"hmrc-guardians-allowance","label":"Guardian's Allowance","fullName":"Guardian's Allowance","dept":"HMRC","deptKey":"hmrc","serviceType":"benefit","deadline":null,"desc":"£21.75/week if raising a child both of whose parents have died (or one has died and the other is untraceable).","govuk_url":"https://www.gov.uk/guardians-allowance","proactive":true,"gated":true,"universal":false,"means_tested":false,"eligibilitySummary":"Guardian's Allowance is paid on top of Child Benefit to those raising a child whose parents have both died. In some cases only one parent needs to have died.","ruleIn":["Both parents deceased or one missing","Claiming Child Benefit for the child"],"ruleOut":["Surviving parent traceable and able to care for child"],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"baby","icon":"◦","name":"Having a Baby"},{"id":"bereavement","icon":"—","name":"Death of Someone Close"}]}},{"data":{"id":"hmrc-statutory-parental-bereavement","label":"Statutory Parental B…","fullName":"Statutory Parental Bereavement Pay & Leave","dept":"HMRC","deptKey":"hmrc","serviceType":"entitlement","deadline":"56 weeks","desc":"2 weeks paid leave if a child under 18 dies or a baby is stillborn after 24 weeks of pregnancy.","govuk_url":"https://www.gov.uk/parental-bereavement-pay-leave","proactive":true,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"Employees are entitled to 2 weeks of paid parental bereavement leave following the death of a child under 18 or a stillbirth after 24 weeks. Must be taken within 56 weeks of the death. Paid at the statutory flat rate.","ruleIn":["Child under 18 died or stillbirth after 24 weeks","Employee at time of bereavement"],"ruleOut":[],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"bereavement","icon":"—","name":"Death of Someone Close"}]}},{"data":{"id":"hmrc-smp","label":"Statutory Maternity …","fullName":"Statutory Maternity Pay","dept":"HMRC","deptKey":"hmrc","serviceType":"entitlement","deadline":null,"desc":"Via employer if 26+ weeks employed and earning above lower earnings limit.","govuk_url":"https://www.gov.uk/maternity-pay-leave/pay","proactive":true,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"Paid by employer for up to 39 weeks. Requires 26 weeks of continuous employment with the same employer by the 15th week before the due date.","ruleIn":["Employed 26+ weeks with same employer","Earnings above lower earnings limit"],"ruleOut":["Self-employed","Fewer than 26 weeks continuous employment"],"autoQualifiers":[],"exclusions":["Self-employed — claim Maternity Allowance instead.","Employed for fewer than 26 weeks with current employer — claim Maternity Allowance."],"lifeEvents":[{"id":"baby","icon":"◦","name":"Having a Baby"}]}},{"data":{"id":"hmrc-spp","label":"Statutory Paternity …","fullName":"Statutory Paternity Pay","dept":"HMRC","deptKey":"hmrc","serviceType":"entitlement","deadline":"8 weeks","desc":"2 weeks at statutory rate. Must be arranged before baby is 8 weeks old.","govuk_url":"https://www.gov.uk/paternity-pay-leave","proactive":true,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"1 or 2 weeks of paternity leave and pay. Must be the baby's father, partner of the mother, or the adopter's partner. Requires 26 weeks of continuous employment.","ruleIn":["Father, partner, or co-adopter of newborn","Employed 26+ weeks continuously"],"ruleOut":[],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"baby","icon":"◦","name":"Having a Baby"}]}},{"data":{"id":"hmrc-spl","label":"Shared Parental Leav…","fullName":"Shared Parental Leave & Pay","dept":"HMRC","deptKey":"hmrc","serviceType":"entitlement","deadline":null,"desc":"Split remaining leave/pay between parents. Complex eligibility — both employers involved.","govuk_url":"https://www.gov.uk/shared-parental-leave-and-pay","proactive":true,"gated":true,"universal":false,"means_tested":false,"eligibilitySummary":"Allows eligible parents to split up to 50 weeks of leave and 37 weeks of pay between them. Both parents must individually meet employment/earnings tests.","ruleIn":["Mother curtailing maternity leave","Both parents meet employment and earnings tests"],"ruleOut":["Mother not eligible for SMP or Maternity Allowance"],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"baby","icon":"◦","name":"Having a Baby"}]}},{"data":{"id":"hmrc-free-childcare-15","label":"Free childcare — 15 …","fullName":"Free childcare — 15 hours","dept":"HMRC","deptKey":"hmrc","serviceType":"entitlement","deadline":null,"desc":"From 9 months old. Universal entitlement. Via Tax-Free Childcare account.","govuk_url":"https://www.gov.uk/help-paying-childcare/free-childcare-and-education-for-2-to-4-year-olds","proactive":true,"gated":false,"universal":true,"means_tested":false,"eligibilitySummary":"Universal 15 hours per week free childcare for children aged 9 months to 4 years. No income test. Apply via Childcare Choices / Tax-Free Childcare account.","ruleIn":["Child aged 9 months to 4 years"],"ruleOut":[],"autoQualifiers":["Child aged 9 months to 4 years"],"exclusions":[],"lifeEvents":[{"id":"baby","icon":"◦","name":"Having a Baby"}]}},{"data":{"id":"hmrc-free-childcare-30","label":"Free childcare — 30 …","fullName":"Free childcare — 30 hours","dept":"HMRC","deptKey":"hmrc","serviceType":"entitlement","deadline":null,"desc":"3–4 year olds where both parents work minimum hours.","govuk_url":"https://www.gov.uk/help-paying-childcare/free-childcare-and-education-for-2-to-4-year-olds","proactive":true,"gated":true,"universal":false,"means_tested":false,"eligibilitySummary":"An additional 15 hours (total 30 hours/week) for 3–4 year olds where both parents (or single parent) are in work earning at least NMW for 16 hours/week and neither earns over £100,000.","ruleIn":["Child aged 3 or 4 years","Both parents in paid work earning NMW for 16 hrs"],"ruleOut":["Either parent earns over £100k","Non-working single parent"],"autoQualifiers":[],"exclusions":["Households where either parent earns over £100k.","Non-working single parents (entitled to 15 hours only)."],"lifeEvents":[{"id":"baby","icon":"◦","name":"Having a Baby"},{"id":"school","icon":"◌","name":"Child Starting School"}]}},{"data":{"id":"hmrc-tax-free-childcare","label":"Tax-Free Childcare a…","fullName":"Tax-Free Childcare account","dept":"HMRC","deptKey":"hmrc","serviceType":"entitlement","deadline":null,"desc":"Government tops up by 25p per £1 saved (max £500/quarter). Cannot use alongside UC childcare element.","govuk_url":"https://www.gov.uk/tax-free-childcare","proactive":true,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"For every £8 a parent pays into their account, the government adds £2 (up to £500 per child per quarter, or £1,000 if disabled). Must be in work and earning at least NMW for 16 hours.","ruleIn":["Both parents in work above minimum threshold","Child under 12"],"ruleOut":["Currently receiving Universal Credit childcare element"],"autoQualifiers":[],"exclusions":["Cannot be used at the same time as Universal Credit childcare element — must choose one."],"lifeEvents":[{"id":"baby","icon":"◦","name":"Having a Baby"}]}},{"data":{"id":"hmrc-marriage-allowance","label" ess and marital status. Affects tax code, benefits and correspondence.","govuk_url":"https://www.gov.uk/tell-hmrc-change-of-details","proactive":true,"gated":false,"universal":true,"means_tested":false,"eligibilitySummary":"Notify HMRC of any change to name, address or marital status. Affects tax code, correspondence and benefit entitlements. Required after moving, marriage, divorce or name change.","ruleIn":[],"ruleOut":[],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"marriage","icon":"∞","name":"Getting Married"},{"id":"moving","icon":"→","name":"Moving House"}]}},{"data":{"id":"hmrc-sdlt","label":"Stamp Duty Land Tax …","fullName":"Stamp Duty Land Tax return","dept":"HMRC","deptKey":"hmrc","serviceType":"obligation","deadline":"14 days","desc":"File within 14 days of completion. Solicitor usually handles. Required even if no tax is due.","govuk_url":"https://www.gov.uk/stamp-duty-land-tax","proactive":true,"gated":true,"universal":true,"means_tested":false,"eligibilitySummary":"A return must be filed within 14 days of completing a property purchase in England or Northern Ireland. The solicitor usually handles this. Must be filed even if no tax is due.","ruleIn":["Property purchase completed in England"],"ruleOut":[],"autoQualifiers":["Property purchase completed in England"],"exclusions":[],"lifeEvents":[{"id":"buying-home","icon":"⌂","name":"Buying a Home"}]}},{"data":{"id":"hmrc-lisa","label":"Lifetime ISA withdra…","fullName":"Lifetime ISA withdrawal","dept":"HMRC","deptKey":"hmrc","serviceType":"entitlement","deadline":null,"desc":"Claim 25% government bonus. Conveyancer requests from ISA provider before completion.","govuk_url":"https://www.gov.uk/lifetime-isa","proactive":true,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"First-time buyers can use their LISA savings (including the 25% government bonus) to purchase a property. Conveyancer requests the funds directly from the ISA provider before completion.","ruleIn":[" :"◈","name":"Starting a Business"}]}},{"data":{"id":"hmrc-mtd","label":"Making Tax Digital e…","fullName":"Making Tax Digital enrolment","dept":"HMRC","deptKey":"hmrc","serviceType":"obligation","deadline":null,"desc":"Mandatory for VAT-registered businesses. Phased rollout for income tax from 2026.","govuk_url":"https://www.gov.uk/guidance/use-making-tax-digital-for-vat","proactive":true,"gated":true,"universal":false,"means_tested":false,"eligibilitySummary":"Mandatory for all VAT-registered businesses — must keep digital records and file VAT returns via MTD-compatible software. Income Tax MTD rolls out from April 2026 for self-employed/landlords with income over £50k.","ruleIn":["VAT-registered business","Self-employed or landlord with income over £50k (from 2026)"],"ruleOut":[],"autoQualifiers":["VAT registered"],"exclusions":[],"lifeEvents":[{"id":"business","icon":"◈","name":"Starting a Business"}]}},{"data":{"id":"hmrc-register-sole-trader","label":"Register as sole tra…","fullName":"Register as sole trader","dept":"HMRC","deptKey":"hmrc","serviceType":"registration","deadline":"5 Oct (yr 2)","desc":"Tell HMRC you are self-employed. Done via Self Assessment registration.","govuk_url":"https://www.gov.uk/set-up-sole-trader","proactive":true,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"Anyone starting to work for themselves as a sole trader must register with HMRC. Done via the Self Assessment registration process. Deadline is 5 October in the second tax year of trading.","ruleIn":["Started trading as sole trader"],"ruleOut":[],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"business","icon":"◈","name":"Starting a Business"}]}},{"data":{"id":"hmrc-carers-credit","label":"Carer's Credit","fullName":"Carer's Credit","dept":"HMRC","deptKey":"hmrc","serviceType":"entitlement","deadline":null,"desc":"National Insurance credits to protect State Pension while caring. For those not claiming Carer's Allowance.","govuk_url":"https://www.gov.uk/carers-credit","proactive":true,"gated":true,"universal":false,"means_tested":false,"eligibilitySummary":"Fills gaps in your NI record while you are caring (20+ hours/week) but not receiving Carer's Allowance. Protects your future State Pension entitlement.","ruleIn":["Caring 20+ hours per week for qualifying benefit recipient","Not receiving NI credits via another route"],"ruleOut":["Already receiving Carer's Allowance"],"autoQualifiers":[],"exclusions":["Not available if already receiving Carer's Allowance — that benefit already provides NI credits."],"lifeEvents":[{"id":"retirement","icon":"◐","name":"Retiring"},{"id":"disability","icon":"◎","name":"Disability or Health Condition"},{"id":"carer","icon":"⊕","name":"Becoming a Carer"}]}},{"data":{"id":"hmrc-child-benefit-transfer","label":"Child Benefit transfer","fullName":"Child Benefit transfer","dept":"HMRC","deptKey":"hmrc","serviceType":"obligation","deadline":null,"desc":"Notify if child now lives with different parent after separation. Only one claimant permitted.","govuk_url":"https://www.gov.uk/child-benefit/change-of-circumstances","proactive":true,"gated":true,"universal":false,"means_tested":false,"eligibilitySummary":"After separation, only one parent can claim Child Benefit per child. If the child's living arrangements change, Child Benefit must be transferred to the main carer.","ruleIn":["Child now living primarily with different parent","Parents separated"],"ruleOut":[],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"divorce","icon":"÷","name":"Separating or Divorcing"}]}},{"data":{"id":"hmrc-ni-check","label":"Check & top up NI re…","fullName":"Check & top up NI record","dept":"HMRC","deptKey":"hmrc","serviceType":"entitlement","deadline":null,"desc":"Check for gaps before retiring. Voluntary contributions can fill missing years.","govuk_url":"https://www.gov.uk/check-national-insurance-record","proactive":true,"gated":false,"universal":true,"means_tested":false,"eligibilityS ing agency","Accountancy or bookkeeping practice","Legal or trust/company service provider","High-value dealer (cash transactions over €10,000)","Art market participant","Casino or gambling business"],"ruleOut":["Business does not fall within any of the nine regulated sectors"],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"business","icon":"◈","name":"Starting a Business"}]}},{"data":{"id":"hmrc-machine-games-duty","label":"Machine Games Duty r…","fullName":"Machine Games Duty registration","dept":"HMRC","deptKey":"hmrc","serviceType":"obligation","deadline":"14 days","desc":"Operators of gaming machines offering prizes must register for Machine Games Duty with HMRC, file quarterly returns, and pay duty on net takings at rates between 5% and 25%.","govuk_url":"https://www.gov.uk/machine-game-duty","proactive":true,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"Mandatory for anyone operating dutiable gaming machines (fruit machines, AWPs, Category B/C/D) on premises with a gambling licence, alcohol licence, gaming machine permit or club certificate. Register at least 14 days before machines go live. File quarterly returns and pay within 30 days.","ruleIn":["Pub owner or tenant with gaming machines","Amusement arcade operator","Betting shop","Bingo hall or social club with gaming machines"],"ruleOut":["Machines offer no prize above play cost","Charity or tournament use only","Domestic machines"],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"business","icon":"◈","name":"Starting a Business"}]}},{"data":{"id":"hmrc-starter-checklist","label":"PAYE Starter Checklist","fullName":"PAYE Starter Checklist","dept":"HMRC","deptKey":"hmrc","serviceType":"obligation","deadline":"Before first payday","desc":"Completed with a new employer when no P45 is available — first jobs, returns to work, and second jobs. Sets the correct tax code before the first payday to avoid emergency tax.","govuk_url":"https://www.gov.uk/paye-forms-p45-p60-p11d/starter-checklist","proactive":true,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"Required when starting a new job without a P45 — whether first job, return after a gap, or an additional concurrent job. The employer provides the form; the employee self-declares their tax situation, student loan plan type, and whether they are receiving any benefits. Without it, the employer must apply an emergency tax code.","ruleIn":["First ever job","Returning to work with no P45","Starting a second or additional concurrent job","Gap in employment and P45 unavailable"],"ruleOut":["P45 already available from most recent employer","Self-employed — not on PAYE"],"autoQualifiers":["Starting a new job with no P45 — employer must use this checklist to set the correct tax code"],"exclusions":["Employee has a valid P45 from their most recent employer (hand P45 to employer instead)","Self-employed (not subject to PAYE)"],"lifeEvents":[{"id":"new-job","icon":"◆","name":"Starting a New Job"}]}},{"data":{"id":"hmrc-ssp","label":"Statutory Sick Pay (…","fullName":"Statutory Sick Pay (SSP)","dept":"HMRC","deptKey":"hmrc","serviceType":"entitlement","deadline":"7 days","desc":"Employees are entitled to £118.75/week SSP from their employer for up to 28 weeks of illness. From April 2026, SSP is payable from day 1 — the 3-day waiting period is removed.","govuk_url":"https://www.gov.uk/statutory-sick-pay","proactive":true,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"Available to employees (including agency workers) who earn an average of at least £125/week and are too ill to work. Notify your employer within 7 days (or their own deadline if earlier). A fit note from a doctor or healthcare professional is required for absences longer than 7 days.","ruleIn":["Employee earning at least £125/week average","Too ill to work","Employer notified within 7 days"],"ruleOut":["Self-employed","Earnings below Lower Earnings Limit","28-week SSP maximum already reached","Currently on Statutory Maternity Pay"],"autoQualifiers":["Employee earning at least £125/week who has notified employer of illness within 7 days"],"exclusions":["Self-employed — no entitlement to SSP","Average weekly earnings below £125","28-week maximum SSP already received for this illness","Currently receiving Statutory Maternity Pay","Failed to notify employer within the required timeframe"],"lifeEvents":[{"id":"new-job","icon":"◆","name":"Starting a New Job"}]}},{"data":{"id":"dwp-tell-us-once","label":"Tell Us Once","fullName":"Tell Us Once","dept":"DWP","deptKey":"dwp","serviceType":"registration","deadline":null,"desc":"Notifies HMRC, DVLA, DWP, passport office and local authority in one step after a death.","govuk_url":"https://www.gov.uk/after-a-death/organisations-you-need-to-contact-and-tell-us-once","proactive":true,"gated":true,"universal":true,"means_tested":false,"eligibilitySummary":"Available in most of England, Wales and Scotland after a death is registered. Notifies up to 23 government organisations in a single interaction. Saves significant time and effort.","ruleIn":["Death registered in England, Scotland, or Wales"],"ruleOut":[],"autoQualifiers":["Death registration completed — reference number provided at registration"],"exclusions":[],"lifeEvents":[{"id":"bereavement","icon":"—","name":"Death of Someone Close"}]}},{"data":{"id":"dwp-bereavement-support","label":"Bereavement Support …","fullName":"Bereavement Support Payment","dept":"DWP","deptKey":"dwp","serviceType":"benefit","deadline":"21 months","desc":"If partner died, you are under State Pension age, and they had a NI record. Lump sum plus monthly payments.","govuk_url":"https://www.gov.uk/bereavement-support-payment","proactive":true,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"A lump sum (up to £3,500) plus up to 18 monthly payments (up to £350/month) if your spouse or civil partner died and you are under State Pension age. Must claim within 3 months for full amount.","ruleIn":["Spouse or civil partner died","Under State Pension age at time of death","Deceased had 25+ weeks NI contributions"],"ruleOut":["Cohabiting but not married or in civil partnership","Partner died before 6 April 2017"],"autoQualifiers":[],"exclusions":["Not available if partner died before 6 April 2017 (different scheme applied).","Not available if you were cohabiting but not married or in a civil partnership."],"lifeEvents":[{"id":"bereavement","icon":"—","name":"Death of Someone Close"}]}},{"data":{"id":"dwp-funeral-payment","label":"Funeral Expenses Pay…","fullName":"Funeral Expenses Payment","dept":"DWP","deptKey":"dwp","serviceType":"grant","deadline":"6 months","desc":"One-off payment toward funeral costs if you are on a qualifying benefit. Must claim within 6 months of the funeral.","govuk_url":"https://www.gov.uk/funeral-payments","proactive":true,"gated":true,"universal":false,"means_tested":true,"eligibilitySummary":"Helps pay for funeral costs if you or your partner receive a qualifying benefit such as Universal Credit, Pension Credit, Income Support, or Housing Benefit. Paid back from the deceased's estate if there are sufficient funds. Must claim within 6 months of the funeral.","ruleIn":["Receiving qualifying means-tested benefit","Responsible for funeral costs"],"ruleOut":["Close relative of deceased able to pay instead"],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"bereavement","icon":"—","name":"Death of Someone Close"}]}},{"data":{"id":"dwp-state-pension","label":"State Pension claim","fullName":"State Pension claim","dept":"DWP","deptKey":"dwp","serviceType":"entitlement","deadline":null,"desc":"Not automatic — must be actively claimed. Apply up to 4 months before State Pension age.","govuk_url":"https://www.gov.uk/new-state-pension/eligibility","proactive":true,"gated":true,"universal":false,"means_tested":false,"eligibilitySummary":"Not paid automatically — must be claimed. Apply up to 4 , epilepsy, thyroid conditions).","ruleIn":["Receiving PIP, DLA, or qualifying medical condition","Under 16, or 60 and over"],"ruleOut":[],"autoQualifiers":["PIP award confirmed","Qualifying medical condition (apply for Medical Exemption Certificate via GP)"],"exclusions":[],"lifeEvents":[{"id":"disability","icon":"◎","name":"Disability or Health Condition"}]}},{"data":{"id":"nhs-care-assessment","label":"Care needs assessment","fullName":"Care needs assessment","dept":"NHS","deptKey":"nhs","serviceType":"application","deadline":null,"desc":"Local authority assesses care needs. Can lead to a care plan and possible funded support.","govuk_url":"https://www.gov.uk/care-needs-assessment-adults","proactive":true,"gated":false,"universal":true,"means_tested":false,"eligibilitySummary":"Any adult can request a care needs assessment from their local authority. Free and means-independent — the assessment itself is free, though resulting care may be means-tested. Can lead to a care plan and funded support.","ruleIn":[],"ruleOut":[],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"disability","icon":"◎","name":"Disability or Health Condition"}]}},{"data":{"id":"dvla-provisional-licence","label":"Provisional Driving …","fullName":"Provisional Driving Licence","dept":"DVLA","deptKey":"dvla","serviceType":"document","deadline":null,"desc":"Apply from age 15 years and 9 months — so it arrives before your 17th birthday. £34 online, £43 by post (D1 form). Required before lessons or booking any test.","govuk_url":"https://www.gov.uk/apply-first-provisional-driving-licence","proactive":true,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"Required before you can take driving lessons or book a theory or practical test. Apply from age 15 years and 9 months so it arrives by your 17th birthday. Costs £34 online or £43 by post. Must be resident in Great Britain for at least 185 days in the last 12 months and be able to read a number plate from 20 metres.","ruleIn":["Aged 15 years and 9 months or over","GB resident for 185+ days in last 12 months"],"ruleOut":["Cannot read number plate at 20 metres"],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"driving","icon":"◉","name":"Learning to Drive"}]}},{"data":{"id":"dvsa-theory-test","label":"Theory Test","fullName":"Theory Test","dept":"DVSA","deptKey":"dvsa","serviceType":"application","deadline":null,"desc":"Must pass before booking the practical test. £23. Multiple-choice (50 questions, 43 to pass) plus hazard perception. Pass certificate valid for 2 years — practical test must be passed within that window.","govuk_url":"https://www.gov.uk/book-theory-test","proactive":true,"gated":true,"universal":false,"means_tested":false,"eligibilitySummary":"All learner drivers must pass a theory test before they can book a practical driving test. Costs £23. Consists of 50 multiple-choice questions and a hazard perception video clip test. Pass certificate is valid for 2 years — if you do not pass the practical test within 2 years you must retake the theory. Must be resident in Great Britain for at least 185 days in the last 12 months.","ruleIn":["Valid provisional driving licence held","GB resident 185+ days in last 12 months"],"ruleOut":["Theory test pass certificate expired (over 2 years old)"],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"driving","icon":"◉","name":"Learning to Drive"}]}},{"data":{"id":"dvsa-driving-test","label":"Driving Test (practi…","fullName":"Driving Test (practical)","dept":"DVSA","deptKey":"dvsa","serviceType":"application","deadline":null,"desc":"Must pass theory test first. £62 (weekday) or £75 (evening/weekend). On passing, DVLA usually sends the full licence automatically. Must claim within 2 years of passing or the pass lapses and you must retake.","govuk_url":"https://www.gov.uk/book-driving-test","proactive":true,"gated":true,"universal":false,"means_tested":false,"eligibilitySummary":"Must pass the theory test before the practical test can be booked. Costs £62 (weekday) or £75 (evening/weekend/bank holiday). On passing, DVLA usually sends the full licence automatically — but if you did not hand your provisional to the examiner, or your name/address has changed, you must apply with form D1 within 2 years. Must be resident in Great Britain for at least 185 days in the last 12 months.","ruleIn":["Theory test passed within last 2 years","GB resident 185+ days in last 12 months"],"ruleOut":["Theory test pass certificate expired (over 2 years old)"],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"driving","icon":"◉","name":"Learning to Drive"}]}},{"data":{"id":"dvla-update-address","label":"Update driving licen…","fullName":"Update driving licence address","dept":"DVLA","deptKey":"dvla","serviceType":"obligation","deadline":"3 months","desc":"Legal requirement to update within 3 months of moving. Can be done online.","govuk_url":"https://www.gov.uk/change-address-driving-licence","proactive":true,"gated":false,"universal":true,"means_tested":false,"eligibilitySummary":"A legal requirement for all driving licence holders within 3 months of moving. Can be done quickly online for free. Failure to update is technically an offence.","ruleIn":["Holds GB driving licence","Has moved to new address"],"ruleOut":[],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"moving","icon":"→","name":"Moving House"}]}},{"data":{"id":"dvla-name-change","label":"Update driving licen…","fullName":"Update driving licence (name change)","dept":"DVLA","deptKey":"dvla","serviceType":"obligation","deadline":null,"desc":"D1 form or online. Legal requirement — licence must reflect current name.","govuk_url":"https://www.gov.uk/change-name-driving-licence","proactive":true,"gated":true,"universal":true,"means_tested":false,"eligibilitySummary":"A legal requirement for driving licence holders who have changed their name — after marriage, civil partnership, deed poll or statutory declaration. Must be updated to reflect current legal name.","ruleIn":["Legal name change after marriage, civil partnership, or deed poll","Holds GB driving licence"],"ruleOut":[],"autoQualifiers":["Marriage or civil partnership certificate received and current licence name is now incorrect"],"exclusions":[],"lifeEvents":[{"id":"marriage","icon":"∞","name":"Getting Married"}]}},{"data":{"id":"dvla-cancel-licence","label":"Cancel driving licence","fullName":"Cancel driving licence","dept":"DVLA","deptKey":"dvla","serviceType":"obligation","deadline":null,"desc":"Covered by Tell Us Once if used after a death. Otherwise notify DVLA directly.","govuk_url":"https://www.gov.uk/dvla/forms/d27","proactive":true,"gated":true,"universal":true,"means_tested":false,"eligibilitySummary":"Must notify DVLA when a driving licence holder dies. Usually handled automatically by Tell Us Once after death registration. Send the licence to DVLA if available.","ruleIn":["Deceased held GB driving licence"],"ruleOut":[],"autoQualifiers":["Tell Us Once completed — DVLA notified automatically"],"exclusions":[],"lifeEvents":[{"id":"bereavement","icon":"—","name":"Death of Someone Close"}]}},{"data":{"id":"dvla-notify-condition","label":"Notify DVLA of medic…","fullName":"Notify DVLA of medical condition","dept":"DVLA","deptKey":"dvla","serviceType":"obligation","deadline":null,"desc":"Legal requirement for many conditions. May affect licence. Check gov.uk list of notifiable conditions.","govuk_url":"https://www.gov.uk/health-conditions-and-driving","proactive":true,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"A legal duty to notify DVLA of any medical condition or treatment that may affect safe driving. Covers a wide range of physical and mental health conditions. Failure to notify can invalidate insurance.","ruleIn":["Holds driving licence","Diagnosed with DVLA notifiable condition"],"ruleOut":[],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"disability","icon":"◎","name":"Disability or Health Condition"}]}},{"data":{"id":"dvla-renew-at-70","label":"Renew driving licenc…","fullName":"Renew driving licence at 70","dept":"DVLA","deptKey":"dvla","serviceType":"obligation","deadline":"Every 3 years","desc":"From age 70 all driving licences expire and must be renewed every 3 years. Free online. Medical self-declaration required. Failure to renew makes driving unlawful.","govuk_url":"https://www.gov.uk/renew-driving-licence-at-70","proactive":true,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"All driving licences expire at age 70 and must be renewed every 3 years thereafter. Renewal is free online (or via D46P form, 3-week processing). Applicant must self-declare they meet minimum eyesight standards and have no condition preventing them from driving. Driving on an expired licence is unlawful.","ruleIn":["Driving licence holder aged 70 or over"],"ruleOut":[],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"retirement","icon":"◐","name":"Retiring"},{"id":"disability","icon":"◎","name":"Disability or Health Condition"}]}},{"data":{"id":"dvla-vehicle-tax","label":"Tax your vehicle","fullName":"Tax your vehicle","dept":"DVLA","deptKey":"dvla","serviceType":"obligation","deadline":"Before driving on road","desc":"Vehicle Excise Duty must be in place before any vehicle is driven or kept on a public road. Apply online, by phone, or at a Post Office. Amount varies by vehicle type and emissions; exempt vehicles must still be taxed at £0.","govuk_url":"https://www.gov.uk/vehicle-tax","proactive":true,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"Any vehicle driven or kept on a public road must be taxed. Requires a V5C in your name (or the green new keeper slip if recently purchased), a valid MOT for most vehicles, and valid insurance. Pay annually or by monthly Direct Debit. Amount depends on vehicle type, age, and CO2 emissions. Exempt vehicles must still be declared.","ruleIn":["Vehicle driven or kept on a public road"],"ruleOut":["Vehicle is SORNed and kept entirely off public roads"],"autoQualifiers":["V5C held in keeper's name, valid MOT and insurance in place"],"exclusions":["Vehicles kept entirely off public roads do not need to be taxed — make a SORN instead."],"lifeEvents":[{"id":"driving","icon":"◉","name":"Learning to Drive"}]}},{"data":{"id":"dvla-sorn","label":"Make a SORN","fullName":"Make a SORN","dept":"DVLA","deptKey":"dvla","serviceType":"obligation","deadline":"When tax expires","desc":"Free Statutory Off Road Notification — required when a vehicle is taken off the road and not being taxed. Tax is cancelled and remaining full months refunded. SORN stays active until the vehicle is taxed again. Driving a SORNed vehicle on a public road is a criminal offence (fine up to £1,000).","govuk_url":"https://www.gov.uk/make-a-sorn","proactive":true,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"A free SORN must be made when a registered keeper stops taxing a vehicle and keeps it off public roads. The vehicle cannot be driven or parked on a public road — doing so is a criminal offence (fine up to £1,000, vehicle may be clamped or impounded). SORN remains in place until the vehicle is taxed again.","ruleIn":["Registered keeper keeping vehicle off public roads"],"ruleOut":["Vehicle already sold (notify DVLA of sale instead)"],"autoQualifiers":[],"exclusions":["You do not need a SORN if you have already notified DVLA that you have sold the vehicle."],"lifeEvents":[{"id":"driving","icon":"◉","name":"Learning to Drive"}]}},{"data":{"id":"dvla-vehicle-sale","label":"Notify DVLA of vehic…","fullName":"Notify DVLA of vehicle sale","dept":"DVLA","deptKey":"dvla","serviceType":"obligation","deadline":"Same day as sale","desc":"Sellers must notify DVLA the same day a vehicle is sold or transferred. Give the green new keeper slip from the V5C to the buyer. DVLA cancels the seller's tax and refunds any full months remaining. Buyer must tax the vehicle (or SORN it) before driving.","govuk_url":"https://www.gov.uk/sold-bought-vehicle","proactive":true,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"When selling or transferring a vehicle, the seller must notify DVLA online immediately. The green new keeper slip from the V5C goes to the buyer. Vehicle tax is not transferred — the buyer must tax the vehicle before driving it (or make a SORN). If no V5C exists, the buyer must apply for one using form V62 (£25).","ruleIn":["Registered keeper selling or transferring vehicle"],"ruleOut":[],"autoQualifiers":["Sale or transfer of a vehicle you are the registered keeper of"],"exclusions":[],"lifeEvents":[{"id":"driving","icon":"◉","name":"Learning to Drive"}]}},{"data":{"id":"ch-register-ltd","label":"Register limited com…","fullName":"Register limited company (IN01)","dept":"Companies House","deptKey":"ch","serviceType":"registration","deadline":null,"desc":"Company name must be available. Same-day registration possible online.","govuk_url":"https://www.gov.uk/limited-company-formation/register-your-company","proactive":true,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"Anyone can register a limited company in the UK. Same-day registration online for £50. Company name must be available and not too similar to existing names. At least one director required.","ruleIn":["Director aged 16 or over","UK registered office address"],"ruleOut":[],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"business","icon":"◈","name":"Starting a Business"}]}},{"data":{"id":"hmcts-probate","label":"Apply for probate","fullName":"Apply for probate","dept":"HMCTS","deptKey":"hmcts","serviceType":"legal_process","deadline":null,"desc":"Required if estate exceeds £10k with most financial institutions. Currently 16+ week wait.","govuk_url":"https://www.gov.uk/applying-for-probate","proactive":true,"gated":true,"universal":false,"means_tested":false,"eligibilitySummary":"Grants legal authority to deal with the estate. Required by most banks, insurers and financial institutions for estates over £10,000. Currently experiencing 16+ week processing times. Costs £273 for estates over £5,000.","ruleIn":["Estate includes solely-held assets over £10,000","Death registered"],"ruleOut":["All assets held jointly (pass automatically)"],"autoQualifiers":[],"exclusions":["Jointly held assets (bank accounts, property) pass outside probate.","Some pension death benefits and life insurance written in trust pass outside probate."],"lifeEvents":[{"id":"bereavement","icon":"—","name":"Death of Someone Close"}]}},{"data":{"id":"hmcts-divorce","label":"Divorce application …","fullName":"Divorce application (D8)","dept":"HMCTS","deptKey":"hmcts","serviceType":"legal_process","deadline":null,"desc":"Online or paper. Conditional order after 20 weeks; final order 6 weeks later.","govuk_url":"https://www.gov.uk/divorce","proactive":true,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"No-fault divorce since April 2022 — no reasons needed. Apply online or on paper. Minimum timescale: 26 weeks (20 weeks to Conditional Order + 6 weeks to Final Order). Can apply jointly or individually.","ruleIn":["Married or in civil partnership at least 1 year","Domiciled or habitually resident in England/Wales"],"ruleOut":[],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"divorce","icon":"÷","name":"Separating or Divorcing"}]}},{"data":{"id":"hmcts-financial-order","label":"Financial Consent Or…","fullName":"Financial Consent Order","dept":"HMCTS","deptKey":"hmcts","serviceType":"legal_process","deadline":null,"desc":"Legally binding division of assets and pension. Strongly advised before final divorce order.","govuk_url":"https://www.gov.uk/money-property-when-relationship-ends/reaching-an-agreement","proactive":true,"gated":true,"universal":false,"means_tested":false,"eligibilitySummary":"A court-approved agreement making division of assets, property and pension legally binding. Strongly advised before the Final Divorce Order — without it, either party can make future financial claims. Usually drafted by solicitors.","ruleIn":["In divorce or dissolution proceedings","Shared assets, property, or pensions"],"ruleOut":[],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"divorce","icon":"÷","name":"Separating or Divorcing"}]}},{"data":{"id":"hmcts-child-arrangements","label":"Child Arrangements O…","fullName":"Child Arrangements Order","dept":"HMCTS","deptKey":"hmcts","serviceType":"legal_process","deadline":null,"desc":"If no agreement on living arrangements. Mediation usually required first.","govuk_url":"https://www.gov.uk/looking-after-children-divorce/apply-for-court-order","proactive":false,"gated":true,"universal":false,"means_tested":false,"eligibilitySummary":"A court order specifying where children live and how much time they spend with each parent. Required only when parents cannot agree through negotiation or mediation. MIAM (mediation) must usually be attempted first.","ruleIn":["Separated parents unable to agree on child arrangements"],"ruleOut":[],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"divorce","icon":"÷","name":"Separating or Divorcing"}]}},{"data":{"id":"hmcts-legal-aid","label":"Legal Aid application","fullName":"Legal Aid application","dept":"HMCTS","deptKey":"hmcts","serviceType":"entitlement","deadline":null,"desc":"Means and merits tested. Available in domestic abuse cases. Applied via Legal Aid Agency.","govuk_url":"https://www.gov.uk/legal-aid","proactive":true,"gated":false,"universal":false,"means_tested":true,"eligibilitySummary":"Government funding for legal advice and representation in certain cases. Both means-tested (income/capital) and merits-tested (strength of case). Domestic abuse cases have wider automatic eligibility. Applied via a legal aid solicitor.","ruleIn":["Disposable income below £2,657/month","Domestic abuse victim or case with strong ":"Moving House"},{"id":"university","icon":"◳","name":"Going to University"}]}},{"data":{"id":"la-voter-authority-cert","label":"Voter Authority Cert…","fullName":"Voter Authority Certificate","dept":"Local Authority","deptKey":"la","serviceType":"document","deadline":"Before election deadline","desc":"Free photo ID for polling stations if you lack an accepted form of photo ID (passport, driving licence, etc.). Apply via local council.","govuk_url":"https://www.gov.uk/apply-for-photo-id-voter-authority-certificate","proactive":true,"gated":true,"universal":false,"means_tested":false,"eligibilitySummary":"Free photo ID for use at polling stations at UK elections, introduced from 2023. Required if you do not have an accepted form of photo ID (such as a passport, driving licence, or certain concessionary bus passes). Apply via your local council.","ruleIn":["Registered to vote","No accepted photo ID (passport, driving licence)"],"ruleOut":["Already holds accepted photo ID for polling"],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"marriage","icon":"∞","name":"Getting Married"},{"id":"buying-home","icon":"⌂","name":"Buying a Home"},{"id":"moving","icon":"→","name":"Moving House"},{"id":"university","icon":"◳","name":"Going to University"}]}},{"data":{"id":"la-council-tax","label":"Council Tax registra…","fullName":"Council Tax registration","dept":"Local Authority","deptKey":"la","serviceType":"obligation","deadline":null,"desc":"Register at new address and close account at old. Various discounts may apply.","govuk_url":"https://www.gov.uk/council-tax","proactive":true,"gated":false,"universal":true,"means_tested":false,"eligibilitySummary":"Any adult who is the resident or owner of a domestic property is liable for Council Tax. Register at your new address and close the account at your old address. Various discounts and exemptions may apply.","ruleIn":[],"ruleOut":[],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"buying-home","icon":"⌂","name":"Buying a Home"},{"id":"moving","icon":"→","name":"Moving House"}]}},{"data":{"id":"la-council-tax-single-discount","label":"Council Tax single p…","fullName":"Council Tax single person discount","dept":"Local Authority","deptKey":"la","serviceType":"entitlement","deadline":null,"desc":"25% discount if now living alone after bereavement or separation.","govuk_url":"https://www.gov.uk/council-tax-discounts","proactive":true,"gated":true,"universal":false,"means_tested":false,"eligibilitySummary":"A 25% reduction in Council Tax if you are the only adult resident in a property. Apply to your local council after bereavement, divorce/separation, or a household member moving out.","ruleIn":["Only adult (18+) now living in the property"],"ruleOut":[],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"bereavement","icon":"—","name":"Death of Someone Close"},{"id":"divorce","icon":"÷","name":"Separating or Divorcing"}]}},{"data":{"id":"la-council-tax-reduction","label":"Council Tax Reduction","fullName":"Council Tax Reduction","dept":"Local Authority","deptKey":"la","serviceType":"benefit","deadline":null,"desc":"Apply to local council. Can reduce bill to zero on very low income.","govuk_url":"https://www.gov.uk/apply-council-tax-reduction","proactive":true,"gated":true,"universal":false,"means_tested":true,"eligibilitySummary":"A means-tested discount on your Council Tax bill. Administered by local councils — schemes vary by area. Can reduce the bill significantly or to zero on very low income.","ruleIn":["Low income or receiving means-tested benefit","Liable for Council Tax at address"],"ruleOut":[],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"retirement","icon":"◐","name":"Retiring"},{"id":"buying-home","icon":"⌂","name":"Buying a Home"},{"id":"moving","icon":"→","name":"Moving House"},{"id":"job-loss","icon":"⊘","name":"Losing Your Job"},{"id":"divorce","icon":"÷","name":"Separating or Divorcing"}]}},{"data":{"id":"la-bus-pass","label":"Free bus pass","ful
