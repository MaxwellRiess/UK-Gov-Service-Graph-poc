nnual net earned income under £7,400. Unlocks Pupil Premium funding for the school.","ruleIn":["Receiving qualifying benefit","Child at state school of compulsory school age"],"ruleOut":[],"autoQualifiers":["Receiving Universal Credit with no or low earned income"],"exclusions":[],"lifeEvents":[{"id":"school","icon":"◌","name":"Child Starting School"}]}},{"data":{"id":"la-send-ehc","label":"SEND EHC plan assess…","fullName":"SEND EHC plan assessment","dept":"Local Authority","deptKey":"la","serviceType":"application","deadline":"20 weeks","desc":"For children with complex needs. Local Authority has 20 weeks to issue the plan.","govuk_url":"https://www.gov.uk/children-with-special-educational-needs/education-health-care-plans","proactive":true,"gated":true,"universal":false,"means_tested":false,"eligibilitySummary":"An Education, Health and Care (EHC) plan for children and young people aged 0-25 with complex SEND needs that cannot be met through standard school support. Local Authority must complete the assessment within 20 weeks.","ruleIn":["Child aged 0–25 with complex SEND needs","Needs not met by standard school support"],"ruleOut":[],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"school","icon":"◌","name":"Child Starting School"}]}},{"data":{"id":"la-blue-badge","label":"Blue Badge","fullName":"Blue Badge","dept":"Local Authority","deptKey":"la","serviceType":"entitlement","deadline":null,"desc":"Auto-qualify on Enhanced Rate PIP mobility. Apply via local council.","govuk_url":"https://www.gov.uk/apply-blue-badge","proactive":true,"gated":true,"universal":false,"means_tested":false,"eligibilitySummary":"Allows parking in disabled bays and on yellow lines. Auto-qualify if receiving Enhanced Rate PIP mobility or DLA (highest mobility rate). Others apply discretionarily. Apply via local council. Costs up to £10.","ruleIn":["Enhanced Rate PIP mobility or severe difficulty walking"],"ruleOut":[],"autoQualifiers":["Enhanced Rate PIP mobility component confirmed"],"exclusions":[],"lifeEvents":[{"id":"retirement","icon":"◐","name":"Retiring"},{"id":"disability","icon":"◎","name":"Disability or Health Condition"}]}},{"data":{"id":"la-disabled-facilities-grant","label":"Disabled Facilities …","fullName":"Disabled Facilities Grant","dept":"Local Authority","deptKey":"la","serviceType":"grant","deadline":null,"desc":"Up to £30k for home adaptations. Means-tested. Apply via local authority.","govuk_url":"https://www.gov.uk/disabled-facilities-grants","proactive":true,"gated":false,"universal":false,"means_tested":true,"eligibilitySummary":"Up to £30,000 (England) towards adaptations to help a disabled person live independently at home: ramps, stairlifts, wider doorways, accessible bathrooms. Means-tested for applicants over 18. Occupational Therapist assessment required.","ruleIn":["Disabled person living in property needing adaptations"],"ruleOut":[],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"disability","icon":"◎","name":"Disability or Health Condition"}]}},{"data":{"id":"la-carers-assessment","label":"Carer's Assessment","fullName":"Carer's Assessment","dept":"Local Authority","deptKey":"la","serviceType":"application","deadline":null,"desc":"Request from local council. Identifies support needs and may unlock local funding.","govuk_url":"https://www.gov.uk/carers-assessment","proactive":true,"gated":false,"universal":true,"means_tested":false,"eligibilitySummary":"Any adult carer can request a free Carer's Assessment from their local authority. Identifies the carer's own needs and may unlock local support, respite care, or one-off grants.","ruleIn":["Adult unpaid carer providing regular substantial care"],"ruleOut":[],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"carer","icon":"⊕","name":"Becoming a Carer"}]}},{"data":{"id":"la-business-rates","label":"Business rates regis…","fullName":"Business rates registration","dept":"Local Authority","deptKey":"la","serviceType":"obligation","deadline":null,"desc":"If using non-domestic premises. Small Business Relief may reduce or eliminate the charge.","govuk_url":"https://www.gov.uk/introduction-to-business-rates","proactive":true,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"Business rates are charged on non-domestic properties used for business. Valuation Office Agency assesses rateable value; local authority bills and collects. Small Business Rate Relief eliminates the charge for properties under £12,000 rateable value.","ruleIn":["Occupying non-domestic premises for business purposes"],"ruleOut":[],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"business","icon":"◈","name":"Starting a Business"}]}},{"data":{"id":"la-food-hygiene","label":"Food hygiene registr…","fullName":"Food hygiene registration","dept":"Local Authority","deptKey":"la","serviceType":"obligation","deadline":"28 days","desc":"Any food business must register with local authority before trading.","govuk_url":"https://www.gov.uk/food-business-registration","proactive":true,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"Any business that sells, cooks, stores, handles, prepares or distributes food must register with their local authority at least 28 days before opening. Free to register. Required for home bakers, market stalls, restaurants, and caterers.","ruleIn":["Operating a food business of any type"],"ruleOut":[],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"business","icon":"◈","name":"Starting a Business"}]}},{"data":{"id":"la-food-premises-approval","label":"Food establishment a…","fullName":"Food establishment approval (animal products)","dept":"Local Authority","deptKey":"la","serviceType":"registration","deadline":null,"desc":"Food businesses handling products of animal origin (meat, fish, dairy, eggs) that supply other establishments require formal approval from their local authority, beyond basic food business registration.","govuk_url":"https://www.gov.uk/find-licences/food-premises-approval","proactive":true,"gated":true,"universal":false,"means_tested":false,"eligibilitySummary":"Required for establishments in England handling products of animal origin (meat, fish, dairy, eggs, processed animal products) that supply other food businesses. Separate from and in addition to basic food hygiene registration. Operating without required approval is a criminal offence.","ruleIn":["Abattoir or cutting plant","Dairy or egg processing","Fish processing","Wholesale supply of animal products to other food businesses"],"ruleOut":["Purely retail or direct-to-consumer with no supply to other establishments","Not handling products of animal origin"],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"business","icon":"◈","name":"Starting a Business"}]}},{"data":{"id":"la-hmo-licence","label":"House in multiple oc…","fullName":"House in multiple occupation (HMO) licence","dept":"Local Authority","deptKey":"la","serviceType":"registration","deadline":null,"desc":"Landlords renting a property to 5 or more people from more than one household who share facilities must obtain a mandatory HMO licence from their local council.","govuk_url":"https://www.gov.uk/find-licences/house-in-multiple-occupation-licence","proactive":true,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"Mandatory for properties rented to 5+ people in 2+ households sharing facilities (toilet, bathroom, or kitchen) in England and Wales. Some councils have additional licensing schemes covering smaller HMOs. Licences last up to 5 years. Unlimited fine for unlicensed operation.","ruleIn":["Renting to 5 or more people from 2 or more households","Shared house or bedsit conversion","Student let or professional house share"],"ruleOut":["Fewer than 5 occupants (unless local additional licensing scheme applies)","All occupants from the same household"],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"business","icon":"◈","name":"Starting a Business"}]}},{"data":{"id":"la-child-performance-licence","label":"Child performance li…","fullName":"Child performance licence","dept":"Local Authority","deptKey":"la","serviceType":"application","deadline":"21 days","desc":"Children below school-leaving age taking part in public performances, sporting events or modelling require a licence from the local council. Applied for by the event organiser, not the parent.","govuk_url":"https://www.gov.uk/apply-for-child-performance-licence","proactive":true,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"Required for children below school-leaving age participating in public performances, sporting events, or professional modelling in England, Scotland and Wales. The event organiser (not the parent) applies at least 21 days before the event.","ruleIn":["Child under school-leaving age in a public performance","Child acting in a professional production","Child modelling assignment","Child in competitive sporting event"],"ruleOut":["Child above school-leaving age","Event is in Northern Ireland","Event is school curriculum-based"],"autoQualifiers":[],"exclusions":[],"lifeEvents":[]}},{"data":{"id":"la-house-to-house-collection-licence","label":"House-to-house colle…","fullName":"House-to-house collection licence","dept":"Local Authority","deptKey":"la","serviceType":"application","deadline":"20 days","desc":"Charities and local groups wishing to collect money or goods door-to-door from residential properties must obtain a free licence from their local council in England and Wales.","govuk_url":"https://www.gov.uk/find-licences/house-to-house-collection-licence","proactive":true,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"Required for charitable organisations collecting door-to-door from residential properties in England and Wales. Free to obtain. Apply at least 20 working days before the collection. Licences valid for up to 1 year. Penalty for no licence: up to 6 months imprisonment or £1,000 fine.","ruleIn":["Charity fundraising door-to-door","Scout or guide group collecting at residential doors","Community fundraiser at residential properties"],"ruleOut":["Commercial (non-charitable) collections","Collections in streets or public places (requires street collection licence instead)"],"autoQualifiers":[],"exclusions":[],"lifeEvents":[]}},{"data":{"id":"la-road-occupation-licence","label":"Road occupation lice…","fullName":"Road occupation licence (building work)","dept":"Local Authority","deptKey":"la","serviceType":"application","deadline":null,"desc":"Anyone digging up or placing materials, equipment or a skip on a public road in connection with building work must obtain a licence from the local council. Cannot be applied for online.","govuk_url":"https://www.gov.uk/find-licences/road-occupation-licence-for-building-work","proactive":true,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"Required for any building work involving breaking or occupying a public road in England and Wales. Must contact the local authority directly — online applications are not accepted. Penalty for non-compliance: £10/day plus the council's remediation costs.","ruleIn":["Road dig for utility connection","Scaffolding overhanging a public road","Construction materials stored on a public highway","Road crossing installation"],"ruleOut":["Work is entirely on private land","Materials or equipment placed only on a private driveway"],"autoQualifiers":[],"exclusions":[],"lifeEvents":[]}},{"data":{"id":"la-scrap-metal-dealer-licence","label":"Scrap metal dealer l…","fullName":"Scrap metal dealer licence","dept":"Local Authority","deptKey":"la","serviceType":"registration","deadline":null,"desc":"Any person or business buying, selling, or storing scrap metal in England and Wales must hold a licence from their local council. Cash payments are prohibited; all transactions must be by bank transfer.","govuk_url":"https://www.gov.uk/find-licences/scrap-metal-dealer-registration","proactive":true,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"Mandatory for all scrap metal dealers in England and Wales. Two types: site licence (fixed premises) and collector's licence (mobile). Licences renew every 3 years. A tax check with HMRC is required at renewal. Fine up to £5,000 for unlicensed dealing.","ruleIn":["Metal recycling business","Car breaker or salvage yard","Buying and selling scrap metal","Mobile metal collection"],"ruleOut":["Not dealing in scrap metal","Located outside England and Wales"],"autoQualifiers":[],"exclusions":[],"lifeEvents":[]}},{"data":{"id":"la-skip-permit","label":"Skip permit (public …","fullName":"Skip permit (public road)","dept":"Local Authority","deptKey":"la","serviceType":"application","deadline":null,"desc":"A permit from the local council is required before placing a skip or container on a public road in England and Wales. No permit is needed if the skip is entirely on private land.","govuk_url":"https://www.gov.uk/find-licences/apply-skip-permit","proactive":true,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"Required whenever a skip is placed on a public road in England and Wales. The skip hire company typically obtains the permit, but individuals should confirm with their local council. Safety requirements: reflective markings, traffic cones, lamps at night, and contact details displayed. Fine up to £1,000 for missing safety markings.","ruleIn":["Skip placed on a public road","Building or renovation waste requiring a roadside skip"],"ruleOut":["Skip placed entirely on private land such as a driveway or garden"],"autoQualifiers":[],"exclusions":[],"lifeEvents":[]}},{"data":{"id":"la-street-collection-licence","label":"Street collection li…","fullName":"Street collection licence","dept":"Local Authority","deptKey":"la","serviceType":"application","deadline":null,"desc":"Collecting money or selling items for charity in a public street or place requires a street collection licence. Apply to the local council, or the Metropolitan Police in Greater London.","govuk_url":"https://www.gov.uk/find-licences/street-collection-licence","proactive":true,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"Required for any charitable collection in a public street or place in England and Wales. Free to obtain. Greater London collections (outside City of London) go through the Metropolitan Police. Penalty: £200 fine for collecting without a licence.","ruleIn":["Charity tin collection in a public street","Street fundraising for charity","Selling items for charity in a public place"],"ruleOut":["Purely commercial sale with no charitable claim","Door-to-door collection (requires house-to-house collection licence instead)"],"autoQualifiers":[],"exclusions":[],"lifeEvents":[]}},{"data":{"id":"la-street-trading-licence","label":"Street trading licence","fullName":"Street trading licence","dept":"Local Authority","deptKey":"la","serviceType":"application","deadline":null,"desc":"Anyone selling goods or services from a street or public place in England and Wales generally requires a street trading licence from their local council. Councils may restrict hours, location or days.","govuk_url":"https://www.gov.uk/find-licences/street-trading-licence","proactive":true,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"Required for most street trading in England and Wales. Holders of a valid pedlar's certificate may be exempt for itinerant trading. Councils can restrict or refuse applications and waiting lists may apply. Fine up to £1,000 for trading without a licence.","ruleIn":["Food van or cart in a public street","Market stall on public land","Mobile trader at a fixed street pitch","Selling goods from a public place"],"ruleOut":["Trading from entirely private land","Holding a valid pedlar's certificate (may be exempt for itinerant trading)"],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"business","icon":"◈","name":"Starting a Business"}]}},{"data":{"id":"la-temporary-events-notice","label":"Temporary Events Not…","fullName":"Temporary Events Notice (TEN)","dept":"Local Authority","deptKey":"la","serviceType":"application","deadline":"10 days","desc":"Allows an individual to hold licensable activities (alcohol sales, entertainment, late-night refreshment) on unlicensed premises for up to 7 days with a maximum of 500 attendees. Fee: £21.","govuk_url":"https://www.gov.uk/find-licences/temporary-events-notice","proactive":true,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"Applicant must be an individual aged 18+ (organisations cannot apply). Maximum 500 people including staff; event up to 168 hours (7 days). Must be submitted at least 10 clear working days before the event. Annual limits apply per individual and per premises.","ruleIn":["One-off event with alcohol or entertainment on unlicensed land","Pop-up bar or outdoor festival","Community fundraiser with regulated entertainment","Private party with licensable activity on unlicensed premises"],"ruleOut":["Organisation (not individual) applying","More than 500 attendees","Event duration over 168 hours","Annual TEN limit already reached","Application received fewer than 5 working days before event"],"autoQualifiers":["Unlicensed venue, under 500 attendees, individual applicant aged 18+"],"exclusions":["Organisation (not individual) applying","More than 500 attendees","Event exceeds 168 hours","Annual TEN limit already reached"],"lifeEvents":[]}},{"data":{"id":"la-public-film-screening","label":"Public film or TV sc…","fullName":"Public film or TV screening permissions","dept":"Local Authority","deptKey":"la","serviceType":"application","deadline":null,"desc":"Showing films or TV in a public setting requires a copyright licence (e.g. from MPLC or Filmbank), a premises licence from the local council, and a TV licence if using TV-receiving equipment.","govuk_url":"https://www.gov.uk/showing-films-in-public","proactive":true,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"Any public screening of films or TV — whether ticketed or free — requires a copyright licence, a premises licence from the local council, and a TV licence if using TV-receiving equipment. Multiple licences are typically needed simultaneously. Commercial streaming subscriptions (e.g. Netflix) do not permit public screening. State school curriculum use is exempt.","ruleIn":["Community cinema or film club","Pub or hotel film night","Outdoor or pop-up cinema","Retail or hotel display screens showing TV content","Staff room TV or film showing"],"ruleOut":["Private home viewing","State school showing curriculum content"],"autoQualifiers":[],"exclusions":[],"lifeEvents":[]}},{"data":{"id":"ea-waste-carrier-registration","label":"Waste carrier, broke…","fullName":"Waste carrier, broker or dealer registration","dept":"Environment Agency","deptKey":"ea","serviceType":"registration","deadline":null,"desc":"Any business that transports, buys, sells, or arranges disposal of waste in England must register with the Environment Agency. Lower-tier (free) covers own waste only; upper-tier covers commercial waste handling.","govuk_url":"https://www.gov.uk/register-renew-waste-carrier-broker-dealer-england","proactive":true,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"Mandatory for all waste carriers, brokers and dealers in England. Two tiers: lower-tier (own waste only, free) and upper-tier (commercial waste handling, £184 initial, renews every 3 years). Changes to business details must be notified within 28 days. Separate registration schemes apply in Scotland, Wales and Northern Ireland.","ruleIn":["Waste collection business","Skip hire company","Construction or demolition waste disposal","Recycling or scrap dealer","Waste broker or hazardous waste transporter"],"ruleOut":["Operating only in Scotland, Wales, or Northern Ireland (separate registration schemes apply)"],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"business","icon":"◈","name":"Starting a Business"}]}},{"data":{"id":"ho-visa","label":"Visa / leave to enter","fullName":"Visa / leave to enter","dept":"Home Office","deptKey":"ho","serviceType":"application","deadline":null,"desc":"Type depends on purpose. Via UK Visas and Immigration. Must be in place before entry.","govuk_url":"https://www.gov.uk/browse/visas-immigration/getting-a-visa","proactive":true,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"Non-UK and non-Irish nationals wishing to enter the UK must apply for the appropriate visa. Type depends on purpose: work, study, family reunion, etc. Must usually be obtained before travel.","ruleIn":["Non-UK/non-Irish national","Specific purpose for entering UK"],"ruleOut":["British or Irish citizen"],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"immigration","icon":"✦","name":"Arriving in the UK"}]}},{"data":{"id":"ho-eu-settled-status","label":"EU Settlement Scheme…","fullName":"EU Settlement Scheme (Settled / Pre-Settled Status)","dept":"Home Office","deptKey":"ho","serviceType":"application","deadline":null,"desc":"For EU/EEA/Swiss nationals who lived in the UK before 31 December 2020. Grants the right to continue living and working in the UK.","govuk_url":"https://www.gov.uk/settled-status-eu-citizens-families","proactive":true,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"EU, EEA and Swiss nationals who were living in the UK before 31 December 2020 can apply for settled status (if they have lived in the UK for 5+ continuous years) or pre-settled status (less than 5 years). Applications are free. A separate Brexit-specific route to the right to remain.","ruleIn":["EU, EEA, or Swiss national","Living in UK before 31 December 2020"],"ruleOut":["Not EU/EEA/Swiss national and not family member of one"],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"immigration","icon":"✦","name":"Arriving in the UK"}]}},{"data":{"id":"ho-brp","label":"Biometric Residence …","fullName":"Biometric Residence Permit","dept":"Home Office","deptKey":"ho","serviceType":"document","deadline":"10 days","desc":"Collect from post office within 10 days of arriving. Proves right to work and rent.","govuk_url":"https://www.gov.uk/biometric-residence-permits","proactive":true,"gated":true,"universal":false,"means_tested":false,"eligibilitySummary":"Issued to non-UK nationals granted leave to remain for more than 6 months. Collect from the named post office within 10 days of arrival in the UK. Required to prove right to work and rent.","ruleIn":["Granted UK visa or leave to remain for 6+ months"],"ruleOut":[],"autoQualifiers":["Visa granted for over 6 months — BRP collection instructions given with visa"],"exclusions":[],"lifeEvents":[{"id":"immigration","icon":"✦","name":"Arriving in the UK"}]}},{"data":{"id":"ho-life-in-uk","label":"Life in the UK test","fullName":"Life in the UK test","dept":"Home Office","deptKey":"ho","serviceType":"application","deadline":null,"desc":"Required for ILR and all citizenship routes (naturalisation, spouse, Irish citizen). 45-minute test, £50 per attempt. Exempt if under 18 or over 65.","govuk_url":"https://www.gov.uk/life-in-the-uk-test","proactive":true,"gated":true,"universal":false,"means_tested":false,"eligibilitySummary":"A 45-minute, 24-question test on British history, culture and values. Required before applying for Indefinite Leave to Remain or any route to British citizenship. Costs £50 per attempt. Exempt if under 18, over 65, or with certain long-term physical or mental conditions.","ruleIn":["Applying for ILR or any citizenship route","Aged 18 to 64"],"ruleOut":["Under 18 or aged 65 and over (exempt)"],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"immigration","icon":"✦","name":"Arriving in the UK"}]}},{"data":{"id":"ho-ilr","label":"Indefinite Leave to …","fullName":"Indefinite Leave to Remain","dept":"Home Office","deptKey":"ho","serviceType":"application","deadline":null,"desc":"After qualifying period. Continuous residence and income requirements apply.","govuk_url":"https://www.gov.uk/indefinite-leave-to-remain","proactive":true,"gated":true,"universal":false,"means_tested":false,"eligibilitySummary":"Gives the right to live, work and study in the UK without immigration restrictions. Usually requires 5 years of lawful residence on an eligible visa. Must not have spent more than 180 days outside the UK in any 12-month period.","ruleIn":["5 years lawful residence on eligible visa","Not exceeded 180 days abroad in any 12-month period"],"ruleOut":[],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"immigration","icon":"✦","name":"Arriving in the UK"}]}},{"data":{"id":"ho-citizenship","label":"British citizenship …","fullName":"British citizenship (naturalisation)","dept":"Home Office","deptKey":"ho","serviceType":"application","deadline":null,"desc":"Standard route after 12 months of ILR or EU settled status. Must have 5 years UK residence, pass the Life in the UK test, and meet the English language and good character requirements. Form AN, £1,735.","govuk_url":"https://www.gov.uk/apply-citizenship-indefinite-leave-to-remain","proactive":true,"gated":true,"universal":false,"means_tested":false,"eligibilitySummary":"Apply to become a British citizen after holding ILR or EU settled status for at least 12 months. Must have 5 years of UK residence with no more than 450 days abroad in that period and 90 days in the final year. Good character and English language required.","ruleIn":["ILR or EU settled status for 12+ months","5 years UK residence with limited absences"],"ruleOut":["More than 450 days abroad in qualifying 5-year period"],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"immigration","icon":"✦","name":"Arriving in the UK"}]}},{"data":{"id":"ho-citizenship-spouse","label":"British citizenship …","fullName":"British citizenship (spouse / civil partner)","dept":"Home Office","deptKey":"ho","serviceType":"application","deadline":null,"desc":"Shortened 3-year route for spouses and civil partners of British citizens. Requires ILR or settled status, Life in the UK test, and good character. Form AN, £1,735.","govuk_url":"https://www.gov.uk/apply-citizenship-spouse","proactive":true,"gated":true,"universal":false,"means_tested":false,"eligibilitySummary":"Spouses and civil partners of British citizens can apply after 3 years of UK residence (vs 5 for standard naturalisation). Must hold ILR or settled status, with no more than 270 days abroad during those 3 years and 90 days in the final year.","ruleIn":["Married to or in civil partnership with British citizen","ILR or settled status held"],"ruleOut":["More than 270 days abroad in qualifying 3-year period"],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"immigration","icon":"✦","name":"Arriving in the UK"}]}},{"data":{"id":"ho-citizenship-ceremony","label":"Citizenship ceremony","fullName":"Citizenship ceremony","dept":"Home Office","deptKey":"ho","serviceType":"obligation","deadline":"3 months","desc":"Required final step after citizenship is approved. Make an oath of allegiance, receive your certificate. Must attend within 3 months of the Home Office invitation. Fee included in the citizenship application.","govuk_url":"https://www.gov.uk/citizenship-ceremonies","proactive":true,"gated":true,"universal":false,"means_tested":false,"eligibilitySummary":"All adults (18+) approved for British citizenship must attend a citizenship ceremony, organised by their local authority, within 3 months of receiving the Home Office invitation. Citizenship is not conferred until the ceremony is completed. The £130 ceremony fee is included in the £1,735 application fee.","ruleIn":["Citizenship application approved","Aged 18 or over"],"ruleOut":[],"autoQualifiers":["Citizenship application approved and invitation letter received"],"exclusions":[],"lifeEvents":[{"id":"immigration","icon":"✦","name":"Arriving in the UK"}]}},{"data":{"id":"ho-drug-precursor-licence","label":"Licence to possess o…","fullName":"Licence to possess or sell drug precursor chemicals","dept":"Home Office","deptKey":"ho","serviceType":"application","deadline":null,"desc":"Businesses or individuals needing to possess or supply chemicals that can be used to manufacture controlled drugs must obtain a licence from the Home Office. Non-compliance carries criminal penalties.","govuk_url":"https://www.gov.uk/find-licences/licence-to-possess-or-sell-drug-precursors","proactive":false,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"Mandatory for businesses or individuals who need to possess or supply classified drug precursor chemicals. Applicants are assessed on competence and integrity. A responsible officer must be designated. Licences can be revoked if conditions are breached.","ruleIn":["Pharmaceutical manufacturer requiring precursor chemicals","Industrial chemical supplier","Research laboratory requiring classified precursors"],"ruleOut":["Chemical is not a classified precursor","Quantity or use falls below the threshold requiring a licence"],"autoQualifiers":[],"exclusions":[],"lifeEvents":[]}},{"data":{"id":"opg-lpa","label":"Lasting Power of Att…","fullName":"Lasting Power of Attorney","dept":"OPG","deptKey":"opg","serviceType":"legal_process","deadline":null,"desc":"Health and welfare and/or property and finance. Register before mental capacity is lost.","govuk_url":"https://www.gov.uk/power-of-attorney","proactive":true,"gated":false,"universal":true,"means_tested":false,"eligibilitySummary":"A legal document appointing trusted people (attorneys) to make decisions on your behalf. Two types: Property & Financial Affairs (can be used immediately), and Health & Welfare (only if you lose capacity). Must be registered with OPG before use.","ruleIn":["Donor aged 18+ with current mental capacity"],"ruleOut":["Donor has already lost mental capacity"],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"carer","icon":"⊕","name":"Becoming a Carer"}]}},{"data":{"id":"opg-lpa-activation","label":"Notify OPG of death","fullName":"Notify OPG of death","dept":"OPG","deptKey":"opg","serviceType":"obligation","deadline":null,"desc":"Notify OPG when LPA holder dies. The registered LPA then ceases to have effect.","govuk_url":"https://www.gov.uk/power-of-attorney/end-a-poa","proactive":true,"gated":true,"universal":false,"means_tested":false,"eligibilitySummary":"When the donor of an LPA dies, their attorneys must notify the Office of the Public Guardian and return the LPA document. The LPA automatically ceases to have effect on death.","ruleIn":["Registered LPA in place","Donor has died"],"ruleOut":[],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"bereavement","icon":"—","name":"Death of Someone Close"},{"id":"carer","icon":"⊕","name":"Becoming a Carer"}]}},{"data":{"id":"lr-registration","label":"Land Registry regist…","fullName":"Land Registry registration (AP1)","dept":"Land Registry","deptKey":"lr","serviceType":"obligation","deadline":null,"desc":"Register new ownership. Solicitor handles. Required for mortgage to complete.","govuk_url":"https://www.gov.uk/registering-land-or-property-with-land-registry","proactive":true,"gated":true,"universal":true,"means_tested":false,"eligibilitySummary":"All property purchases in England and Wales must be registered at HM Land Registry. Usually handled by the solicitor/conveyancer. Priority period starts when the application is received — must be submitted promptly after completion.","ruleIn":["Property purchase completed in England or Wales"],"ruleOut":[],"autoQualifiers":["Property purchase completed and SDLT filed — solicitor handles Land Registry application"],"exclusions":[],"lifeEvents":[{"id":"buying-home","icon":"⌂","name":"Buying a Home"}]}},{"data":{"id":"other-passport-name","label":"Passport name change","fullName":"Passport name change","dept":"HMPO","deptKey":"other","serviceType":"document","deadline":null,"desc":"Not legally required after marriage but strongly recommended. Use marriage certificate.","govuk_url":"https://www.gov.uk/renew-adult-passport","proactive":true,"gated":true,"universal":true,"means_tested":false,"eligibilitySummary":"Not a legal requirement but strongly recommended after a name change. A passport in your new name is accepted as proof of identity for employment, travel, and financial services. Use the marriage certificate or deed poll as supporting evidence.","ruleIn":["Legal name change via marriage or deed poll"],"ruleOut":[],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"marriage","icon":"∞","name":"Getting Married"}]}},{"data":{"id":"other-tv-licence-pension","label":"TV Licence concession","fullName":"TV Licence concession","dept":"TV Licensing","deptKey":"other","serviceType":"entitlement","deadline":null,"desc":"Free if aged 75+ AND receiving Pension Credit.","govuk_url":"https://www.gov.uk/tv-licence/get-a-free-or-discounted-tv-licence","proactive":true,"gated":true,"universal":false,"means_tested":false,"eligibilitySummary":"Free TV licence for households where at least one person is 75 or over AND receives Pension Credit. The 75+ person or their partner must be the Pension Credit claimant.","ruleIn":["Aged 75 or over","Receiving Pension Credit"],"ruleOut":["Under 75","Not receiving Pension Credit"],"autoQualifiers":["Aged 75+ AND receiving Pension Credit"],"exclusions":[],"lifeEvents":[{"id":"retirement","icon":"◐","name":"Retiring"}]}},{"data":{"id":"other-motability","label":"Motability scheme","fullName":"Motability scheme","dept":"Motability","deptKey":"other","serviceType":"entitlement","deadline":null,"desc":"Car or scooter lease using mobility component. Requires Enhanced Rate PIP mobility.","govuk_url":"https://www.motability.co.uk/","proactive":true,"gated":true,"universal":false,"means_tested":false,"eligibilitySummary":"Lease a car, powered wheelchair or scooter by using the Enhanced Rate of the Mobility Component of PIP. The allowance is paid directly to Motability. No credit check required.","ruleIn":["Enhanced Rate PIP mobility component","12+ months remaining on PIP award"],"ruleOut":[],"autoQualifiers":["Enhanced Rate PIP mobility with 12+ months remaining on award"],"exclusions":[],"lifeEvents":[{"id":"disability","icon":"◎","name":"Disability or Health Condition"}]}},{"data":{"id":"other-disabled-railcard","label":"Disabled Persons Rai…","fullName":"Disabled Persons Railcard","dept":"Rail Delivery Group","deptKey":"other","serviceType":"entitlement","deadline":null,"desc":"One third off most rail fares. Various disability benefits qualify automatically.","govuk_url":"https://www.disabledpersons-railcard.co.uk/","proactive":true,"gated":true,"universal":false,"means_tested":false,"eligibilitySummary":"1/3 off most rail fares for the holder and a companion. Qualifying conditions include receiving PIP, DLA, Attendance Allowance, being registered blind/partially sighted, or having epilepsy or severe mental or physical disability. Costs £20/year.","ruleIn":["Receiving PIP, DLA, or Attendance Allowance"],"ruleOut":[],"autoQualifiers":["Any PIP award (daily living or mobility, any rate)","Attendance Allowance (any rate)"],"exclusions":[],"lifeEvents":[{"id":"retirement","icon":"◐","name":"Retiring"},{"id":"disability","icon":"◎","name":"Disability or Health Condition"}]}},{"data":{"id":"other-employers-liability","label":"Employers' Liability…","fullName":"Employers' Liability Insurance","dept":"Other","deptKey":"other","serviceType":"obligation","deadline":"Before employing","desc":"Legal requirement if employing anyone. Minimum £5m cover.","govuk_url":"https://www.gov.uk/employers-liability-insurance","proactive":true,"gated":true,"universal":false,"means_tested":false,"eligibilitySummary":"A legal requirement for virtually all businesses that employ staff. Must have at least £5 million cover. Certificate must be displayed at each workplace. Penalties of up to £2,500/day for non-compliance.","ruleIn":["Employing one or more staff"],"ruleOut":["Sole director business employing no other staff"],"autoQualifiers":["Registered as employer with HMRC PAYE"],"exclusions":["Some exemptions exist for businesses employing only their owner (sole director), and certain family businesses."],"lifeEvents":[{"id":"business","icon":"◈","name":"Starting a Business"}]}},{"data":{"id":"other-dbs","label":"DBS check","fullName":"DBS check","dept":"DBS","deptKey":"other","serviceType":"application","deadline":null,"desc":"If working with children or vulnerable adults. Standard or enhanced check.","govuk_url":"https://www.gov.uk/dbs-check-applicant-criminal-record","proactive":false,"gated":false,"universal":false,"means_tested":false,"eligibilitySummary":"A criminal record check required for roles involving work with children or vulnerable adults. Employers apply on behalf of the employee. Three levels: Basic (anyone), Standard (specified roles), Enhanced (children/vulnerable adult work).","ruleIn":["Role involves working with children or vulnerable adults"],"ruleOut":[],"autoQualifiers":[],"exclusions":[],"lifeEvents":[{"id":"business","icon":"◈","name":"Starting a Business"}]}},{"data":{"id":"other-right-to-work","label":"Right to work check","fullName":"Right to work check","dept":"Employer","deptKey":"other","serviceType":"obligation","deadline":null,"desc":"Employer obligation to verify before hiring. Online share code or document check.","govuk_url":"https://www.gov.uk/check-job-applicant-right-to-work","proactive":true,"gated":true,"universal":true,"means_tested":false,"eligibilitySummary":"Employers are legally required to verify that every employee has the right to work in the UK before they start. For non-UK/Irish nationals this is typically done via a Home Office share code online service.","ruleIn":[],"ruleOut":[]         { selector: 'edge[type="REQUIRES"]', style: {
            'line-color': '#3b82f6', 'target-arrow-color': '#3b82f6',
            'target-arrow-shape': 'triangle', 'curve-style': 'bezier',
            'width': 2, 'line-style': 'solid', 'opacity': 0.75,
        }},
        { selector: 'edge[type="ENABLES"]', style: {
            'line-color': '#4b5563', 'target-arrow-color': '#4b5563',
            'target-arrow-shape': 'triangle', 'curve-style': 'bezier',
            'width': 1.5, 'line-style': 'dashed', 'opacity': 0.55,
        }},
        { selector: '.hl',  style: { 'opacity': 1 }},
        { selector: 'node.hl', style: { 'border-width': 2.5, 'border-color': '#fbbf24' }},
        { selector: 'edge.hl[type="REQUIRES"]', style: { 'line-color': '#60a5fa', 'target-arrow-color': '#60a5fa', 'opacity': 1 }},
        { selector: 'edge.hl[type="ENABLES"]',  style: { 'line-color': '#6b7280', 'target-arrow-color': '#6b7280', 'opacity': 0.85 }},
        { selector: '.dim', style: { 'opacity': 0.07 }},
        { selector: 'node.sel', style: { 'border-width': 3, 'border-color': '#fff' }},
        { selector: '.hidden', style: { 'display': 'none' }},
      ],
      layout: {
        name: 'cose', animate: false, fit: true, padding: 30,
        idealEdgeLength: 120, nodeRepulsion: 480000, edgeElasticity: 100,
        gravity: 80, numIter: 1000, nodeOverlap: 30, componentSpacing: 100,
      }
    });

    var activeEv = null, activeDept = null;

    function clearFilters() {
      activeEv = null; activeDept = null;
      document.querySelectorAll('.ev-btn').forEach(function(b) { b.classList.remove('active'); });
      document.querySelectorAll('.dept-row').forEach(function(r) { r.classList.remove('active'); });
      cy.elements().removeClass('hl dim');
    }

    function onEvClick(eid, btn) {
      if (activeEv === eid) { activeEv = null; btn.classList.remove('active'); cy.elements().removeClass('hl dim'); return; }
      activeEv = eid; activeDept = null;
      document.querySelectorAll('.ev-btn').forEach(function(b) { b.classList.remove('active'); });
      document.querySelectorAll('.dept-row').forEach(function(r) { r.classList.remove('active'); });
      btn.classList.add('active');
      var evt = EVENTS_DATA.find(function(e) { return e.id === eid; });
      var reach = getReachable(evt.entryNodes);
      cy.batch(function() {
        cy.elements().removeClass('hl dim');
        cy.nodes().forEach(function(n) { n.addClass(reach[n.id()] ? 'hl' : 'dim'); });
        cy.edges().forEach(function(e) { e.addClass((reach[e.data('source')] && reach[e.data('target')]) ? 'hl' : 'dim'); });
      });
    }

    function onDeptClick(dk, row) {
      if (activeDept === dk) { activeDept = null; row.classList.remove('active'); cy.elements().removeClass('hl dim'); return; }
      activeDept = dk; activeEv = null;
      document.querySelectorAll('.ev-btn').forEach(function(b) { b.classList.remove('active'); });
      document.querySelectorAll('.dept-row').forEach(function(r) { r.classList.remove('active'); });
      row.classList.add('active');
      cy.batch(function() {
        cy.elements().removeClass('hl dim');
        cy.nodes().forEach(function(n) { n.addClass(n.data('deptKey') === dk ? 'hl' : 'dim'); });
        cy.edges().forEach(function(e) {
          var sd = cy.getElementById(e.data('source')).data('deptKey');
          var td = cy.getElementById(e.data('target')).data('deptKey');
          e.addClass((sd === dk || td === dk) ? 'hl' : 'dim');
        });
      });
    }

    var matchInfo = document.getElementById('match-info');
    document.getElementById('search').addEventListener('input', function() {
      var q = this.value.trim().toLowerCase();
      if (!q) { clearFilters(); matchInfo.classList.remove('vis'); return; }
      activeEv = null; activeDept = null;
      document.querySelectorAll('.ev-btn').forEach(function(b) { b.classList.remove('active'); });
      document.querySelectorAll('.dept-row').forEach(function(r) { r.classList.remove('active'); });
      var hits = 0;
      cy.batch(function() {
        cy.elements().removeClass('hl dim');
        cy.nodes().forEach(function(n) {
          var match = n.data('fullName').toLowerCase().includes(q)
                   || n.id().toLowerCase().includes(q)
                   || n.data('dept').toLowerCase().includes(q);
          n.addClass(match ? 'hl' : 'dim');
          if (match) hits++;
        });
        cy.edges().addClass('dim');
      });
      matchInfo.textContent = hits + ' match' + (hits === 1 ? '' : 'es');
      matchInfo.classList.add('vis');
    });

    document.getElementById('tog-req').addEventListener('change', function() {
      cy.edges('[type="REQUIRES"]').toggleClass('hidden', !this.checked);
    });
    document.getElementById('tog-enb').addEventListener('change', function() {
      cy.edges('[type="ENABLES"]').toggleClass('hidden', !this.checked);
    });

    document.querySelectorAll('.lay-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.lay-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        var name = btn.dataset.layout;
        var opts = { name: name, animate: false, fit: true, padding: 30 };
        if (name === 'cose') {
          Object.assign(opts, { idealEdgeLength: 120, nodeRepulsion: 480000, edgeElasticity: 100, gravity: 80, numIter: 1000, nodeOverlap: 30 });
        } else if (name === 'dagre') {
          Object.assign(opts, { rankDir: 'TB', nodeSep: 55, rankSep: 75, edgeSep: 10 });
        } else if (name === 'breadthfirst') {
          Object.assign(opts, { directed: true, spacingFactor: 1.3 });
        }
        cy.layout(opts).run();
      });
    });

    document.getElementById('reset-btn').addEventListener('click', function() {
      document.getElementById('search').value = '';
      matchInfo.classList.remove('vis');
      clearFilters();
    });

    var detPanel = document.getElementById('detail');
    var detBody  = document.getElementById('det-body');
    document.getElementById('det-close').addEventListener('click', function() {
      detPanel.classList.remove('open');
      cy.nodes().removeClass('sel');
    });

    cy.on('tap', 'node', function(evt) {
      var node = evt.target;
      cy.nodes().removeClass('sel');
      node.addClass('sel');
      var d = node.data();

      var inEdges = [], outEdges = [];
      node.incomers('edge').forEach(function(e) {
        inEdges.push({ name: e.source().data('fullName'), id: e.source().id(), type: e.data('type') });
      });
      node.outgoers('edge').forEach(function(e) {
        outEdges.push({ name: e.target().data('fullName'), id: e.target().id(), type: e.data('type') });
      });

      var badges = '<span class="bdg bdg-dept">' + d.dept + '</span>'
        + '<span class="bdg bdg-type">' + d.serviceType + '</span>'
        + (d.deadline ? '<span class="bdg bdg-dl">&#x23F1; ' + d.deadline + '</span>' : '')
        + (d.proactive    ? '<span class="bdg bdg-pro">proactive</span>'    : '')
        + (d.gated        ? '<span class="bdg bdg-gat">gated</span>'        : '')
        + (d.universal    ? '<span class="bdg bdg-uni">universal</span>'    : '')
        + (d.means_tested ? '<span class="bdg bdg-mns">means-tested</span>' : '');

      function nodeList(arr) {
        return arr.map(function(n) {
          return '<li>' + n.name + '<br><span class="det-nid">' + n.type + '  ' + n.id + '</span></li>';
        }).join('');
      }

      detBody.innerHTML =
        '<p class="det-name">' + d.fullName + '</p>'
        + '<div>' + badges + '</div>'
        + '<p class="det-desc">' + d.desc + '</p>'
        + '<p class="det-elig">' + d.eligibilitySummary + '</p>'
        + (d.ruleIn  && d.ruleIn.length
            ? '<div class="elig-tags">'
              + d.ruleIn.map(function(s){ return '<span class="etag etag-in">✓ '+s+'</span>'; }).join('')
              + '</div>' : '')
        + (d.ruleOut && d.ruleOut.length
            ? '<div class="elig-tags">'
              + d.ruleOut.map(function(s){ return '<span class="etag etag-out">✗ '+s+'</span>'; }).join('')
              + '</div>' : '')
        + (d.autoQualifiers && d.autoQualifiers.length
            ? '<p class="det-stitle">Auto-qualifiers</p>'
              + '<ul class="aq-list">'
              + d.autoQualifiers.map(function(s){ return '<li>'+s+'</li>'; }).join('')
              + '</ul>' : '')
        + (d.exclusions && d.exclusions.length
            ? '<p class="det-stitle">Exclusions</p>'
              + '<ul class="ex-list">'
              + d.exclusions.map(function(s){ return '<li>'+s+'</li>'; }).join('')
              + '</ul>' : '')
        + (d.lifeEvents && d.lifeEvents.length
            ? '<p class="det-stitle">Appears in (' + d.lifeEvents.length + ' life event' + (d.lifeEvents.length !== 1 ? 's' : '') + ')</p>'
              + '<div class="le-tags">'
              + d.lifeEvents.map(function(le){ return '<span class="le-tag">' + le.icon + ' ' + le.name + '</span>'; }).join('')
              + '</div>'
            : '')
        + (inEdges.length  ? '<p class="det-stitle">Prerequisites (' + inEdges.length + ')</p><ul class="det-list">' + nodeList(inEdges) + '</ul>' : '')
        + (outEdges.length ? '<p class="det-stitle">Leads to (' + outEdges.length + ')</p><ul class="det-list">' + nodeList(outEdges) + '</ul>' : '')
        + '<a class="det-link" href="' + d.govuk_url + '" target="_blank" rel="noopener">&#x2197; ' + d.govuk_url + '</a>'
        + '<p class="det-id">' + d.id + '</p>';

      detPanel.classList.add('open');
    });

    cy.on('tap', function(evt) {
      if (evt.target === cy) { detPanel.classList.remove('open'); cy.nodes().removeClass('sel'); }
    });
  </script>
</body>
</html>
